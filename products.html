<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>團購系統 - 商品管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --soft-bg: #f8f9fa;
            --navbar-bg: #8ab6d6;
            --theme-color: #66bb6a;
            --theme-light: #e8f5e9;
            --theme-dark: #2e7d32;
        }
        body { background-color: var(--soft-bg); }
        .navbar-custom { background-color: var(--navbar-bg) !important; }
        .card { border: none; border-radius: 15px; overflow: hidden; }
        .card-header-custom {
            background-color: var(--theme-light);
            color: var(--theme-dark);
            font-weight: bold;
            border-bottom: 2px solid var(--theme-color);
        }
        .btn-theme { background-color: var(--theme-color); color: white; border: none; }
        .btn-theme:hover { background-color: var(--theme-dark); color: white; }
        .table-hover tbody tr:hover { background-color: var(--theme-light); }

        .dropdown-menu-scroll { max-height: 250px; overflow-y: auto; }
        .dropdown-item-custom { cursor: pointer; padding: 10px 15px; border-bottom: 1px solid #f1f1f1; transition: background 0.2s; }
        .dropdown-item-custom:hover { background-color: var(--theme-light); color: var(--theme-dark); }
        .dropdown-item-custom small { display: block; color: #888; font-size: 0.85rem; margin-top: 2px; }
        .search-box-container { padding: 10px; background-color: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 10; }
        
        /* 買家列表樣式 */
        .buyer-item { background-color: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .buyer-item input { width: 70px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-shop-window me-2"></i>團購小幫手</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link active" href="products.html"><i class="bi bi-box2 me-1"></i>商品管理</a>
                <a class="nav-link" href="customers.html"><i class="bi bi-people me-1"></i>客戶管理</a>
                <a class="nav-link" href="orders.html"><i class="bi bi-cart-check me-1"></i>訂單管理</a>
                <a class="nav-link" href="reports.html"><i class="bi bi-graph-up me-1"></i>銷售報表</a>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <!-- 左側：輸入表單 -->
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-header card-header-custom">
                    <i class="bi bi-pencil-square me-2"></i><span id="formTitle">新增商品</span>
                </div>
                <div class="card-body">
                    <form id="productForm">
                        <input type="hidden" id="editId">
                        
                        <div class="mb-3">
                            <label class="form-label text-muted small">商品名稱</label>
                            <input type="text" class="form-control" id="pName" required placeholder="例如：韓國海苔">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small">銷售價 (賣給客人)</label>
                            <input type="number" class="form-control" id="pPrice" required min="0">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small">批發價 (進貨成本)</label>
                            <input type="number" class="form-control" id="pCost" required min="0">
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted small">商品備註 (選填)</label>
                            <input type="text" class="form-control" id="pNote" placeholder="例如：需冷凍、易碎品...">
                        </div>

                        <!-- ================= 新增：多客開單區塊 ================= -->
                        <div class="mt-4 pt-3 border-top">
                            <div class="mb-2 fw-bold text-dark"><i class="bi bi-cart-plus-fill text-success me-1"></i>一鍵批次開單 (選填)</div>
                            <div class="bg-light p-3 rounded mb-3 border">
                                <div class="mb-3">
                                    <label class="form-label text-muted small">1. 搜尋並加入客戶</label>
                                    <div class="dropdown">
                                        <button class="btn btn-outline-primary btn-sm w-100 text-start d-flex justify-content-between align-items-center dropdown-toggle bg-white" 
                                                type="button" id="custDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
                                            <span>點擊搜尋客戶...</span>
                                        </button>
                                        <div class="dropdown-menu w-100 p-0 dropdown-menu-scroll" aria-labelledby="custDropdownBtn">
                                            <div class="search-box-container" onclick="event.stopPropagation()">
                                                <input type="text" class="form-control form-control-sm" id="custSearchInput" placeholder="搜尋姓名或Line..." autocomplete="off">
                                            </div>
                                            <div id="custListContainer"></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="mb-1">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <label class="form-label text-muted small mb-0">2. 開單名單與數量</label>
                                        <span class="badge bg-secondary" id="buyerCountBadge">0 人</span>
                                    </div>
                                    <!-- 買家列表容器 -->
                                    <div id="selectedBuyersContainer" style="max-height: 200px; overflow-y: auto;">
                                        <div class="text-center text-muted small py-3 bg-white border rounded" id="emptyBuyersText">尚未加入任何客戶</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- ================= 區塊結束 ================= -->

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-theme btn-lg" id="submitBtn">儲存資料</button>
                            <button type="button" class="btn btn-secondary d-none" id="cancelBtn">取消編輯</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- 右側：列表 -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header card-header-custom d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-list-ul me-2"></i>商品清單</span>
                    <input type="text" id="searchInput" class="form-control form-control-sm w-50" placeholder="搜尋商品名稱...">
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">名稱</th>
                                <th>備註</th>
                                <th>銷售價</th>
                                <th>批發價</th>
                                <th>毛利</th>
                                <th class="text-end pe-4">操作</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            <!-- JS 渲染 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, updateDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { firebaseConfig } from './firebase-config.js';

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let isEditing = false;
    let allProducts = [];
    let allCustomers = []; 
    
    // 新增：儲存多位買家的陣列 [{id: '...', name: '...', qty: 1}, ...]
    let selectedBuyers = []; 

    const form = document.getElementById('productForm');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const formTitle = document.getElementById('formTitle');

    const custSearchInput = document.getElementById('custSearchInput');
    const custListContainer = document.getElementById('custListContainer');
    const selectedBuyersContainer = document.getElementById('selectedBuyersContainer');
    const emptyBuyersText = document.getElementById('emptyBuyersText');
    const buyerCountBadge = document.getElementById('buyerCountBadge');

    // 初始化
    async function initData() {
        await loadProducts();
        const snapCust = await getDocs(query(collection(db, "customers"), orderBy("joinedAt", "desc")));
        allCustomers = snapCust.docs.map(d => ({id: d.id, ...d.data()}));
        renderCustList(allCustomers);
    }

    // --- 客戶搜尋下拉邏輯 ---
    function renderCustList(list) {
        custListContainer.innerHTML = '';
        if(list.length === 0) {
            custListContainer.innerHTML = '<div class="text-muted p-2 text-center small">找不到客戶</div>';
            return;
        }
        list.forEach(c => {
            const div = document.createElement('div');
            div.className = 'dropdown-item-custom';
            const label = c.lineNick ? `${c.name} (${c.lineNick})` : c.name;
            div.innerHTML = `<strong class="text-dark">${c.name}</strong>${c.lineNick ? '<small class="text-primary ms-1">'+c.lineNick+'</small>' : ''}`;
            
            div.onclick = () => {
                addBuyer(c); // 加入買家名單
                custSearchInput.value = ''; 
                renderCustList(allCustomers); // 重置列表
            };
            custListContainer.appendChild(div);
        });
    }

    custSearchInput.addEventListener('input', (e) => {
        const key = e.target.value.toLowerCase();
        const filtered = allCustomers.filter(c => c.name.toLowerCase().includes(key) || (c.lineNick && c.lineNick.toLowerCase().includes(key)));
        renderCustList(filtered);
    });

    // --- 買家名單操作邏輯 ---
    function addBuyer(customer) {
        // 檢查是否已存在名單中
        const existBuyer = selectedBuyers.find(b => b.id === customer.id);
        if (existBuyer) {
            existBuyer.qty += 1; // 存在就直接數量+1
        } else {
            selectedBuyers.push({
                id: customer.id,
                name: customer.name,
                qty: 1
            });
        }
        renderBuyersUI();
    }

    function removeBuyer(index) {
        selectedBuyers.splice(index, 1);
        renderBuyersUI();
    }

    function updateBuyerQty(index, newQty) {
        if (newQty < 1) newQty = 1;
        selectedBuyers[index].qty = Number(newQty);
    }

    function renderBuyersUI() {
        buyerCountBadge.innerText = `${selectedBuyers.length} 人`;

        if (selectedBuyers.length === 0) {
            emptyBuyersText.style.display = 'block';
            // 清除除了空提示以外的節點
            Array.from(selectedBuyersContainer.children).forEach(child => {
                if (child.id !== 'emptyBuyersText') selectedBuyersContainer.removeChild(child);
            });
            return;
        }

        emptyBuyersText.style.display = 'none';
        
        // 重新渲染清單
        Array.from(selectedBuyersContainer.children).forEach(child => {
            if (child.id !== 'emptyBuyersText') selectedBuyersContainer.removeChild(child);
        });

        selectedBuyers.forEach((buyer, index) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'buyer-item';
            
            itemDiv.innerHTML = `
                <span class="fw-bold text-dark"><i class="bi bi-person-fill text-primary me-1"></i>${buyer.name}</span>
                <div class="d-flex align-items-center">
                    <span class="text-muted small me-2">數量</span>
                    <input type="number" class="form-control form-control-sm me-2" value="${buyer.qty}" min="1">
                    <button type="button" class="btn btn-sm btn-outline-danger" title="移除"><i class="bi bi-x-lg"></i></button>
                </div>
            `;

            // 綁定輸入數量事件
            const qtyInput = itemDiv.querySelector('input');
            qtyInput.addEventListener('change', (e) => updateBuyerQty(index, e.target.value));

            // 綁定移除按鈕事件
            const removeBtn = itemDiv.querySelector('button');
            removeBtn.addEventListener('click', () => removeBuyer(index));

            selectedBuyersContainer.appendChild(itemDiv);
        });
    }

    // --- 表單送出邏輯 ---
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const name = document.getElementById('pName').value.trim();
        const cost = Number(document.getElementById('pCost').value);
        const price = Number(document.getElementById('pPrice').value);
        const note = document.getElementById('pNote').value.trim();
        const editId = document.getElementById('editId').value;

        if(!name) return;
        submitBtn.disabled = true;
        submitBtn.innerText = "處理中...";

        try {
            // 防呆檢查
            const q = query(collection(db, "products"), where("name", "==", name));
            const snapshot = await getDocs(q);
            const isDuplicate = snapshot.docs.some(doc => doc.id !== editId);

            if (isDuplicate) {
                alert(`錯誤：商品名稱「${name}」已經存在！`);
                submitBtn.disabled = false;
                submitBtn.innerText = isEditing ? "確認更新" : "儲存資料";
                return;
            }

            let savedProdId = editId;

            // 1. 儲存/更新商品
            if (isEditing) {
                await updateDoc(doc(db, "products", editId), {
                    name, cost, price, note, updatedAt: new Date()
                });
            } else {
                const docRef = await addDoc(collection(db, "products"), {
                    name, cost, price, note, createdAt: new Date()
                });
                savedProdId = docRef.id; 
            }
            
            // 2. 批次建立訂單
            if (selectedBuyers.length > 0) {
                // 使用 Promise.all 同時處理多張訂單，提升速度
                const orderPromises = selectedBuyers.map(buyer => {
                    const totalAmount = price * buyer.qty;
                    const orderItems = [{
                        id: savedProdId,
                        name: name,
                        price: price,
                        qty: buyer.qty,
                        note: note
                    }];

                    return addDoc(collection(db, "orders"), {
                        customerId: buyer.id,
                        customerName: buyer.name,
                        items: orderItems,
                        totalAmount: totalAmount,
                        orderDate: new Date(),
                        status: 'pending' // 預設未出貨
                    });
                });

                await Promise.all(orderPromises);
                alert(`商品儲存成功！已同時幫 ${selectedBuyers.length} 位客戶開立訂單。`);
            } else {
                // alert("商品儲存成功");
            }

            resetForm();
            await loadProducts();
            
        } catch (error) {
            console.error("Error: ", error);
            alert("操作失敗: " + error.message);
        } finally {
            submitBtn.disabled = false;
        }
    });

    async function loadProducts() {
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderTable(allProducts);
    }

    function renderTable(data) {
        const tbody = document.getElementById('productTableBody');
        tbody.innerHTML = '';
        data.forEach(item => {
            const profit = item.price - item.cost;
            const profitClass = profit >= 0 ? 'text-success' : 'text-danger';
            const noteDisplay = item.note ? `<span class="badge bg-secondary" title="${item.note}"><i class="bi bi-info-circle"></i> ${item.note}</span>` : '<span class="text-muted small">-</span>';
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="ps-4 fw-medium">${item.name}</td>
                <td>${noteDisplay}</td>
                <td class="fw-bold">$${item.price}</td>
                <td class="text-secondary">$${item.cost}</td>
                <td class="${profitClass}">$${profit}</td>
                <td class="text-end pe-4">
                    <button class="btn btn-sm btn-outline-primary me-1 btn-edit" data-id="${item.id}"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${item.id}"><i class="bi bi-trash"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        document.querySelectorAll('.btn-edit').forEach(btn => btn.addEventListener('click', () => startEdit(btn.dataset.id)));
        document.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', () => deleteProduct(btn.dataset.id)));
    }

    function startEdit(id) {
        const product = allProducts.find(p => p.id === id);
        if (!product) return;
        document.getElementById('editId').value = product.id;
        document.getElementById('pName').value = product.name;
        document.getElementById('pCost').value = product.cost;
        document.getElementById('pPrice').value = product.price;
        document.getElementById('pNote').value = product.note || '';

        isEditing = true;
        formTitle.textContent = "編輯商品";
        submitBtn.textContent = "確認更新";
        submitBtn.classList.replace('btn-theme', 'btn-warning');
        cancelBtn.classList.remove('d-none');
    }

    cancelBtn.addEventListener('click', resetForm);

    function resetForm() {
        isEditing = false;
        form.reset();
        document.getElementById('editId').value = '';
        
        formTitle.textContent = "新增商品";
        submitBtn.textContent = "儲存資料";
        submitBtn.classList.replace('btn-warning', 'btn-theme');
        cancelBtn.classList.add('d-none');
        
        // 重置多客開單列表
        selectedBuyers = [];
        renderBuyersUI();
    }

    async function deleteProduct(id) {
        if(confirm("確定要刪除這個商品嗎？\n注意：這不會影響已經開立的訂單。")) {
            await deleteDoc(doc(db, "products", id));
            loadProducts();
        }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const keyword = e.target.value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(keyword));
        renderTable(filtered);
    });

    initData();
</script>
</body>
</html>
